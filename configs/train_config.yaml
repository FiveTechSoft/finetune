# Fine-tuning configuration for agentic LLM
# Model: Qwen3-32B (o tu modelo local)

model:
  name: "Qwen/Qwen3-32B"
  max_seq_length: 8192
  dtype: "bfloat16"
  load_in_4bit: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./outputs/qwen3-32b-agentic"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_steps: 100
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  logging_steps: 10
  save_steps: 500
  save_total_limit: 3
  eval_strategy: "steps"
  eval_steps: 500
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  report_to: "wandb"
  seed: 42

dataset:
  train_file: "./dataset/train.jsonl"
  eval_file: "./dataset/eval.jsonl"
  max_samples: null  # null = use all

loop:
  enabled: true
  max_loops: 5
  epochs_per_loop: 2
  augment_factor: 0.3
  target_metric: "tool_call_accuracy"
  target_threshold: 0.95
